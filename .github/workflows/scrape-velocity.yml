name: Velocity Check

on:
  schedule:
    - cron: '0 2 * * *'   # same time next day catches 24h window
  workflow_dispatch:

jobs:
  velocity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run velocity check
        run: npx ts-node --project scraper/tsconfig.json scraper/velocity.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FANSLY_EMAIL: ${{ secrets.FANSLY_EMAIL }}
          FANSLY_PASSWORD: ${{ secrets.FANSLY_PASSWORD }}
          FANSLY_TOTP_KEY: ${{ secrets.FANSLY_TOTP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MANAGER_CHAT_ID: ${{ secrets.TELEGRAM_MANAGER_CHAT_ID }}
